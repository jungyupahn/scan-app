<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>재고부족 스캔</title>
<style>
  :root{
    --bg:#f3f7ff;
    --card:#ffffff;
    --line:#d8e4f7;
    --line2:#c8d7ef;
    --navy:#08245c;
    --blue:#0a66ff;
    --blue2:#eaf2ff;
    --green:#14b86a;
    --green-bg:#eafaf2;
    --red:#ff4d57;
    --text:#0f2347;
    --muted:#65728a;
    --shadow:0 14px 32px rgba(24,59,112,.08);
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif;
    max-width:480px;
    min-height:100vh;
    margin:0 auto;
  }

  .top{
    background:#fff;
    padding:22px 24px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:16px;
  }

  .logo{
    width:52px;
    height:52px;
    border-radius:14px;
    background:linear-gradient(145deg,#0066ff,#0b92ff);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    letter-spacing:-1px;
    box-shadow:0 10px 22px rgba(10,102,255,.24);
  }

  .top-title{flex:1;}
  .top-title h1{
    margin:0 0 6px;
    font-size:23px;
    letter-spacing:-.7px;
    color:var(--navy);
  }
  .top-title p{
    margin:0;
    font-size:14px;
    color:var(--muted);
  }
  .status-pill{
    background:var(--green-bg);
    color:#079257;
    border:1px solid #aeeccb;
    padding:10px 14px;
    border-radius:999px;
    font-weight:800;
    font-size:15px;
    white-space:nowrap;
  }
  .status-pill::before{
    content:"●";
    margin-right:6px;
    font-size:13px;
  }

  .wrap{padding:16px 16px 34px;}

  .worker-summary{
    margin:0 0 16px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:22px;
    padding:18px 22px;
    box-shadow:var(--shadow);
    display:flex;
    align-items:center;
    gap:14px;
  }
  .avatar{
    width:38px;
    height:38px;
    border-radius:50%;
    background:#eef4ff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:19px;
  }
  .worker-name{
    font-size:18px;
    font-weight:900;
    color:#031f55;
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:16px;
  }

  .card-head{
    background:#f9fbff;
    border-bottom:1px solid var(--line);
    padding:18px 22px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .step{
    background:var(--navy);
    color:#fff;
    padding:7px 12px;
    border-radius:9px;
    font-size:14px;
    font-weight:900;
  }
  .card-head .title{
    font-size:17px;
    font-weight:900;
    color:#5b6b85;
  }
  .body{padding:22px;}

  label.field-label{
    display:block;
    font-size:15px;
    font-weight:900;
    color:#5b6b85;
    margin-bottom:10px;
  }
  .required{
    color:var(--red);
    font-weight:900;
    margin-left:4px;
  }
  .optional{
    color:var(--blue);
    font-weight:900;
    margin-left:4px;
  }

  input[type="text"], textarea{
    width:100%;
    border:1.5px solid var(--line2);
    border-radius:16px;
    padding:17px 16px;
    font-size:18px;
    outline:none;
    background:#fff;
    color:var(--text);
    transition:.15s;
  }
  input[type="text"]:focus, textarea:focus{
    border-color:var(--blue);
    box-shadow:0 0 0 4px rgba(10,102,255,.08);
  }
  input::placeholder, textarea::placeholder{color:#777;}
  textarea{
    min-height:92px;
    resize:none;
    font-family:inherit;
  }
  .help{
    margin:12px 0 0;
    color:#5d6d8a;
    line-height:1.45;
    font-size:14px;
  }

  .checkbox-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  .check-card{
    min-height:58px;
    border:1.5px solid var(--line2);
    border-radius:15px;
    background:#fff;
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
    user-select:none;
    color:#071f4d;
  }
  .check-card input{
    width:22px;
    height:22px;
    margin:0;
    accent-color:var(--blue);
  }
  .check-card:has(input:checked){
    border-color:var(--blue);
    background:var(--blue2);
    color:var(--blue);
    box-shadow:0 0 0 2px rgba(10,102,255,.06) inset;
  }

  .submit{
    width:100%;
    border:none;
    border-radius:18px;
    padding:18px 16px;
    font-size:19px;
    font-weight:900;
    color:#fff;
    background:linear-gradient(135deg,#0a66ff,#004fce);
    cursor:pointer;
    margin-top:22px;
    box-shadow:0 14px 26px rgba(10,102,255,.22);
  }
  .submit:disabled{
    background:#e4ebf6;
    color:#9aa8bd;
    box-shadow:none;
    cursor:not-allowed;
  }
  .submit:active{transform:scale(.99);}

  .accordion{
    background:#fff;
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:var(--shadow);
    margin:24px 0 22px;
    overflow:hidden;
  }
  .accordion button{
    width:100%;
    border:0;
    background:#fff;
    padding:20px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:17px;
    font-weight:900;
    color:#071f4d;
    cursor:pointer;
  }
  .admin-body{
    display:none;
    padding:0 22px 22px;
    border-top:1px solid var(--line);
  }
  .admin-body.open{display:block;}
  .small-btn{
    margin-top:12px;
    border:0;
    background:var(--navy);
    color:#fff;
    font-weight:900;
    border-radius:14px;
    padding:14px 18px;
    font-size:16px;
  }

  .log-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:#687690;
    font-size:17px;
    font-weight:900;
    margin:0 0 10px;
  }
  .count-pill{
    color:var(--blue);
    background:#edf5ff;
    border:1px solid #b7d5ff;
    border-radius:999px;
    padding:7px 13px;
  }
  .log-list{display:flex;flex-direction:column;gap:10px;}
  .log-item{
    background:#fff;
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px 16px;
    box-shadow:0 8px 20px rgba(24,59,112,.06);
  }
  .log-top{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-bottom:7px;
  }
  .log-loc{font-weight:900;color:var(--blue);font-size:17px;}
  .log-time{color:#7b889b;font-size:13px;}
  .tags{display:flex;gap:6px;flex-wrap:wrap;}
  .tag{
    background:#f2f6fc;
    color:#5d6d8a;
    border-radius:8px;
    padding:5px 8px;
    font-size:12px;
    font-weight:800;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:24px;
    transform:translateX(-50%) translateY(80px);
    background:#061f56;
    color:#fff;
    padding:13px 20px;
    border-radius:999px;
    font-weight:900;
    font-size:15px;
    box-shadow:0 14px 30px rgba(0,0,0,.18);
    opacity:0;
    transition:.22s;
    z-index:999;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  .toast.error{background:#e23b45;}

  @media(max-width:380px){
    .checkbox-grid{grid-template-columns:1fr;}
    .top{padding:18px 16px;}
    .top-title h1{font-size:20px;}
  }
</style>
</head>
<body>
  <header class="top">
    <div class="logo">FST</div>
    <div class="top-title">
      <h1>재고부족 스캔</h1>
      <p>FASSTO Smart Logistics · Picking Zone</p>
    </div>
    <div class="status-pill" id="serverStatus">대기중</div>
  </header>

  <main class="wrap">
    <section class="worker-summary">
      <div class="avatar">👷</div>
      <div class="worker-name" id="workerDisplay">작업자명 미설정</div>
    </section>

    <section class="card">
      <div class="card-head">
        <span class="step">STEP 1</span>
        <span class="title">작업자 정보</span>
      </div>
      <div class="body">
        <label class="field-label">작업자명<span class="required">필수</span></label>
        <input id="workerInput" type="text" placeholder="예: 홍길동" autocomplete="off" />
        <p class="help">작업자명은 필수입니다. 저장 후 같은 PDA에서 자동 표시됩니다.</p>
        <button class="small-btn" onclick="saveWorker()">작업자 정보 저장</button>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <span class="step">STEP 2</span>
        <span class="title">로케이션 스캔</span>
      </div>
      <div class="body">
        <label class="field-label">로케이션<span class="required">필수</span></label>
        <input id="locationInput" type="text" placeholder="바코드 스캔 또는 직접 입력" autocomplete="off" autocorrect="off" spellcheck="false" />

        <div style="height:18px"></div>

        <label class="field-label">상태 선택<span class="optional">선택 / 복수 선택 가능</span></label>
        <div class="checkbox-grid">
          <label class="check-card"><input type="checkbox" name="status" value="재고 없음">재고 없음</label>
          <label class="check-card"><input type="checkbox" name="status" value="일부 부족">일부 부족</label>
          <label class="check-card"><input type="checkbox" name="status" value="빈 박스 있음">빈 박스 있음</label>
          <label class="check-card"><input type="checkbox" name="status" value="다른 상품 있음">다른 상품 있음</label>
          <label class="check-card"><input type="checkbox" name="status" value="로케이션 오류">로케이션 오류</label>
          <label class="check-card"><input type="checkbox" name="status" value="기타 확인 필요">기타 확인 필요</label>
        </div>

        <div style="height:22px"></div>

        <label class="field-label">메모</label>
        <textarea id="memoInput" placeholder="예: 빈 박스 있음, 오피킹 확인 필요 등"></textarea>

        <button class="submit" id="submitBtn" onclick="submitRecord()" disabled>재고부족 등록</button>
      </div>
    </section>

    <!-- Apps Script URL is fixed in code. Admin settings hidden for field workers. -->

    <section>
      <div class="log-head">
        <span>오늘 등록 내역</span>
        <span class="count-pill" id="logCount">0건</span>
      </div>
      <div class="log-list" id="logList"></div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

<script>
/*
  최초 배포 후 아래 값에 Apps Script /exec URL을 넣으면 화면에서 URL 입력 없이 고정 사용됩니다.
  예: const FIXED_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/배포ID/exec';
*/
const FIXED_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkHkf3TcPoxJx1Y840j09IrdOFtewAkn6EkW1Jp7zLFpSYHn_6fUwVVO6nj6fW80an2A/exec';

const STORAGE_KEY_WORKER = 'stock_shortage_worker';
const STORAGE_KEY_URL = 'stock_shortage_script_url';
const STORAGE_KEY_DATE = 'stock_shortage_date';
const STORAGE_KEY_LOG = 'stock_shortage_log';

let records = [];

function $(id){ return document.getElementById(id); }

function init(){
  const savedWorker = localStorage.getItem(STORAGE_KEY_WORKER) || '';
  $('workerInput').value = savedWorker;
  updateWorkerDisplay(savedWorker);

  const savedUrl = localStorage.getItem(STORAGE_KEY_URL) || '';
  if ($('scriptUrlInput')) {
    $('scriptUrlInput').value = savedUrl || FIXED_APPS_SCRIPT_URL;
  }

  const today = new Date().toLocaleDateString('sv-SE', {timeZone:'Asia/Seoul'});
  if(localStorage.getItem(STORAGE_KEY_DATE) !== today){
    localStorage.setItem(STORAGE_KEY_DATE, today);
    localStorage.setItem(STORAGE_KEY_LOG, '[]');
  }

  records = JSON.parse(localStorage.getItem(STORAGE_KEY_LOG) || '[]');
  renderLog();

  $('workerInput').addEventListener('input', validateForm);
  $('locationInput').addEventListener('input', validateForm);
  $('locationInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !$('submitBtn').disabled){
      e.preventDefault();
      submitRecord();
    }
  });

  validateForm();
  $('locationInput').focus();
}

function getScriptUrl(){
  return FIXED_APPS_SCRIPT_URL || localStorage.getItem(STORAGE_KEY_URL) || $('scriptUrlInput').value.trim();
}

function saveWorker(){
  const worker = $('workerInput').value.trim();
  if(!worker){
    showToast('작업자명을 입력해주세요.', true);
    return;
  }
  localStorage.setItem(STORAGE_KEY_WORKER, worker);
  updateWorkerDisplay(worker);
  validateForm();
  showToast('작업자 정보 저장 완료');
  $('locationInput').focus();
}

function updateWorkerDisplay(worker){
  $('workerDisplay').textContent = worker ? worker : '작업자명 미설정';
}

function saveScriptUrl(){
  const url = $('scriptUrlInput').value.trim();
  if(!url){
    showToast('Apps Script URL을 입력해주세요.', true);
    return;
  }
  localStorage.setItem(STORAGE_KEY_URL, url);
  showToast('URL 저장 완료');
}

function toggleAdmin(){
  $('adminBody').classList.toggle('open');
  $('adminArrow').textContent = $('adminBody').classList.contains('open') ? '▲' : '▼';
}

function validateForm(){
  const worker = $('workerInput').value.trim();
  const location = $('locationInput').value.trim();
  $('submitBtn').disabled = !(worker && location);
}

function getSelectedStatuses(){
  return Array.from(document.querySelectorAll('input[name="status"]:checked'))
    .map(el => el.value);
}

async function submitRecord(){
  const worker = $('workerInput').value.trim();
  const location = $('locationInput').value.trim().toUpperCase();
  const memo = $('memoInput').value.trim();
  const statuses = getSelectedStatuses();

  if(!worker){
    showToast('작업자명은 필수입니다.', true);
    return;
  }
  if(!location){
    showToast('로케이션은 필수입니다.', true);
    return;
  }

  localStorage.setItem(STORAGE_KEY_WORKER, worker);
  updateWorkerDisplay(worker);

  const now = new Date();
  const record = {
    requestId: `${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
    timestamp: now.toISOString(),
    timeStr: now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}),
    location,
    status: statuses.join(', '),
    worker,
    memo
  };

  $('serverStatus').textContent = '전송중';

  const ok = await sendToSheet(record);

  records.unshift(record);
  records = records.slice(0, 50);
  localStorage.setItem(STORAGE_KEY_LOG, JSON.stringify(records));
  renderLog();

  $('serverStatus').textContent = '대기중';

  if(ok){
    showToast('재고부족 등록 완료');
  }else{
    showToast('로컬 저장 완료 · 시트 URL 확인 필요', true);
  }

  $('locationInput').value = '';
  $('memoInput').value = '';
  document.querySelectorAll('input[name="status"]').forEach(el => el.checked = false);
  validateForm();
  $('locationInput').focus();
}

async function sendToSheet(record){
  const url = getScriptUrl();
  if(!url) return false;

  try{
    const target = url + '?data=' + encodeURIComponent(JSON.stringify(record));
    await fetch(target, { method:'GET', mode:'no-cors' });
    return true;
  }catch(e){
    console.error(e);
    return false;
  }
}

function renderLog(){
  $('logCount').textContent = `${records.length}건`;
  const list = $('logList');

  if(records.length === 0){
    list.innerHTML = '';
    return;
  }

  list.innerHTML = records.map(r => `
    <div class="log-item">
      <div class="log-top">
        <span class="log-loc">${escapeHtml(r.location)}</span>
        <span class="log-time">${escapeHtml(r.timeStr || '')}</span>
      </div>
      <div class="tags">
        <span class="tag">${escapeHtml(r.worker || '')}</span>
        ${r.status ? `<span class="tag">${escapeHtml(r.status)}</span>` : `<span class="tag">상태 미선택</span>`}
        ${r.memo ? `<span class="tag">메모 있음</span>` : ''}
      </div>
      ${r.memo ? `<div style="margin-top:8px;color:#5d6d8a;font-size:13px;">${escapeHtml(r.memo)}</div>` : ''}
    </div>
  `).join('');
}

function escapeHtml(str){
  return String(str || '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

function showToast(msg, isError=false){
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
