<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>피킹존 재고부족 알림</title>
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --border:#30363d;
    --accent:#f0b429; --green:#3fb950; --red:#f85149; --blue:#58a6ff;
    --text:#e6edf3; --muted:#8b949e;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:Arial,'Noto Sans KR',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:28px}
  .header{position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px}
  .logo{width:34px;height:34px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#000;font-weight:800}
  h1{font-size:16px}.sub{font-size:11px;color:var(--muted);margin-top:2px}.badge{margin-left:auto;font-size:11px;color:var(--green);border:1px solid rgba(63,185,80,.3);border-radius:99px;padding:4px 8px;background:rgba(63,185,80,.12)}
  .workerbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;align-items:center;font-size:13px}.zone{margin-left:auto;color:var(--accent);font-size:11px;border:1px solid rgba(240,180,41,.25);padding:3px 8px;border-radius:5px}
  .section{padding:16px}.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px}.card-h{background:var(--surface2);border-bottom:1px solid var(--border);padding:12px 14px;display:flex;gap:8px;align-items:center;color:var(--muted);font-size:13px}.step{background:var(--accent);color:#000;font-weight:700;border-radius:5px;padding:3px 8px;font-size:11px}.body{padding:14px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}.req{color:var(--red)}
  input,textarea,select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:13px 12px;color:var(--text);font-size:15px;outline:none;margin-bottom:12px}input:focus,textarea:focus,select:focus{border-color:var(--accent)}textarea{resize:none;font-family:inherit}.row{display:flex;gap:10px}.row>div{flex:1}
  .info{display:none;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:12px}.info.on{display:block}.info small{display:block;color:var(--muted);font-size:11px;margin-bottom:3px}.info b{font-size:14px}
  .btn{width:100%;border:none;border-radius:10px;padding:15px;font-weight:800;font-size:15px;background:var(--accent);color:#000}.btn:disabled{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}.btn:active{transform:scale(.985)}
  .mini{font-size:12px;color:var(--muted);line-height:1.45;margin-top:-4px;margin-bottom:12px}.config-toggle{width:100%;background:none;border:none;color:var(--muted);padding:14px;text-align:left}.config-body{display:none;border-top:1px solid var(--border);padding:14px}.config-body.on{display:block}.save{background:var(--blue);color:#000;border:none;border-radius:8px;padding:10px 14px;font-weight:700}
  .logs-h{display:flex;justify-content:space-between;align-items:center;margin:16px 0 10px;font-size:13px;color:var(--muted)}.log{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px}.log-top{display:flex;justify-content:space-between;margin-bottom:6px}.loc{font-weight:800;color:var(--accent);font-family:monospace}.time{color:var(--muted);font-size:12px}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}.tag{border:1px solid var(--border);background:var(--surface2);border-radius:5px;padding:3px 7px;font-size:11px;color:var(--muted)}.ok{color:var(--green);border-color:rgba(63,185,80,.3)}
  .empty{text-align:center;color:var(--muted);padding:26px 0;font-size:13px}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,80px);background:var(--green);color:#000;border-radius:99px;padding:11px 18px;font-size:13px;font-weight:800;transition:.25s;white-space:nowrap}.toast.on{transform:translate(-50%,0)}.toast.err{background:var(--red);color:#fff}
</style>
</head>
<body>
  <div class="header">
    <div class="logo">WH</div>
    <div><h1>재고부족 스캔</h1><div class="sub">피킹존 · 재고부족 알림 시스템</div></div>
    <div class="badge" id="statusBadge">● 대기중</div>
  </div>

  <div class="workerbar">
    <span>👷</span><span id="workerView">작업자명 미설정</span>
    <span class="zone" id="zoneView">ZONE-?</span>
  </div>

  <div class="section">
    <div class="card">
      <div class="card-h"><span class="step">STEP 1</span><span>작업자 정보</span></div>
      <div class="body">
        <label>작업자명 <span class="req">필수</span></label>
        <input id="workerInput" type="text" placeholder="예: 홍길동" autocomplete="off" />
        <label>담당구역</label>
        <input id="zoneInput" type="text" placeholder="예: A구역 / 1층 / ZONE-A" autocomplete="off" />
        <div class="mini">작업자명은 저장 후 다음 접속 시 자동 표시됩니다.</div>
        <button class="save" onclick="saveWorker()">작업자 정보 저장</button>
      </div>
    </div>

    <div class="card">
      <div class="card-h"><span class="step">STEP 2</span><span>로케이션 스캔</span></div>
      <div class="body">
        <label>로케이션 <span class="req">필수</span></label>
        <input id="locationInput" type="text" placeholder="바코드 스캔 또는 직접 입력" autocomplete="off" autocorrect="off" spellcheck="false" />

        <div class="info" id="locationInfo">
          <small>로케이션</small><b id="infoLocation">-</b>
          <div class="row" style="margin-top:10px">
            <div><small>상품명</small><b id="infoProduct">-</b></div>
            <div><small>SKU</small><b id="infoSku">-</b></div>
          </div>
        </div>

        <label>상태 선택</label>
        <select id="reasonInput">
          <option value="재고 없음">재고 없음</option>
          <option value="일부 부족">일부 부족</option>
          <option value="빈 박스 있음">빈 박스 있음</option>
          <option value="다른 상품 있음">다른 상품 있음</option>
          <option value="기타 확인 필요">기타 확인 필요</option>
        </select>

        <label>메모</label>
        <textarea id="memoInput" rows="2" placeholder="예: 빈 박스 있음, 오피킹 확인 필요 등"></textarea>
        <button class="btn" id="submitBtn" onclick="submitRecord()" disabled>재고부족 등록</button>
      </div>
    </div>

    <div class="card">
      <button class="config-toggle" onclick="toggleConfig()">⚙ 관리자 설정 / Apps Script URL</button>
      <div class="config-body" id="configBody">
        <label>Apps Script 웹앱 URL</label>
        <input id="scriptUrlInput" type="text" placeholder="https://script.google.com/macros/s/.../exec" />
        <div class="mini">배포 후 /exec 로 끝나는 URL을 입력하세요.</div>
        <button class="save" onclick="saveScriptUrl()">URL 저장</button>
      </div>
    </div>

    <div class="logs-h"><span>오늘 등록 내역</span><span id="logCount">0건</span></div>
    <div id="logList"><div class="empty">아직 등록된 재고부족 없음</div></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
// Apps Script 배포 후 이곳에 기본 URL을 넣어도 되고, 화면의 관리자 설정에서 저장해도 됩니다.
const DEFAULT_APPS_SCRIPT_URL = '';

// 실제 FMS 연동 전 임시 표시용 데이터입니다. 필요 없으면 비워두세요.
const PRODUCT_MAP = {
  'A-01-01': { product: '무선 마우스 M720', sku: 'SKU-00123' },
  'A-01-02': { product: '기계식 키보드 K3', sku: 'SKU-00124' },
  'A-01-03': { product: '모니터 27인치 4K', sku: 'SKU-00125' },
  'B-02-01': { product: '에어팟 프로 2세대', sku: 'SKU-00201' }
};

let records = [];
const $ = (id) => document.getElementById(id);

function init() {
  $('workerInput').value = localStorage.getItem('workerName') || '';
  $('zoneInput').value = localStorage.getItem('workerZone') || '';
  $('scriptUrlInput').value = localStorage.getItem('appsScriptUrl') || DEFAULT_APPS_SCRIPT_URL;

  const todayKey = new Date().toLocaleDateString('ko-KR');
  if (localStorage.getItem('recordDate') !== todayKey) {
    localStorage.setItem('recordDate', todayKey);
    localStorage.setItem('recordsToday', '[]');
  }
  records = JSON.parse(localStorage.getItem('recordsToday') || '[]');
  refreshWorkerView();
  renderLogs();
  validateForm();
  $('locationInput').focus();
}

function refreshWorkerView() {
  const worker = $('workerInput').value.trim();
  const zone = $('zoneInput').value.trim();
  $('workerView').textContent = worker ? worker : '작업자명 미설정';
  $('zoneView').textContent = zone ? zone : 'ZONE-?';
}

function saveWorker() {
  const worker = $('workerInput').value.trim();
  const zone = $('zoneInput').value.trim();
  if (!worker) return showToast('작업자명은 필수입니다.', true);
  localStorage.setItem('workerName', worker);
  localStorage.setItem('workerZone', zone);
  refreshWorkerView();
  validateForm();
  showToast('작업자 정보 저장 완료');
  $('locationInput').focus();
}

function toggleConfig() { $('configBody').classList.toggle('on'); }
function saveScriptUrl() {
  localStorage.setItem('appsScriptUrl', $('scriptUrlInput').value.trim());
  showToast('Apps Script URL 저장 완료');
}

$('workerInput').addEventListener('input', () => { refreshWorkerView(); validateForm(); });
$('zoneInput').addEventListener('input', refreshWorkerView);
$('locationInput').addEventListener('input', () => { lookupLocation(); validateForm(); });
$('locationInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (!$('submitBtn').disabled) submitRecord();
  }
});

function lookupLocation() {
  const loc = normalizeLocation($('locationInput').value);
  if (!loc) {
    $('locationInfo').classList.remove('on');
    return;
  }
  const info = PRODUCT_MAP[loc] || { product: '상품 정보 없음', sku: '' };
  $('infoLocation').textContent = loc;
  $('infoProduct').textContent = info.product;
  $('infoSku').textContent = info.sku || '-';
  $('locationInfo').classList.add('on');
}

function validateForm() {
  const worker = $('workerInput').value.trim();
  const location = $('locationInput').value.trim();
  $('submitBtn').disabled = !(worker && location.length >= 2);
}

async function submitRecord() {
  const worker = $('workerInput').value.trim();
  const zone = $('zoneInput').value.trim();
  const location = normalizeLocation($('locationInput').value);
  const reason = $('reasonInput').value;
  const memo = $('memoInput').value.trim();

  if (!worker) return showToast('작업자명을 먼저 입력하세요.', true);
  if (!location) return showToast('로케이션을 입력하세요.', true);

  localStorage.setItem('workerName', worker);
  localStorage.setItem('workerZone', zone);

  const now = new Date();
  const info = PRODUCT_MAP[location] || { product: '', sku: '' };
  const record = {
    timestamp: now.toISOString(),
    timeStr: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false }),
    location,
    product: info.product || '',
    sku: info.sku || '',
    worker,
    zone,
    memo: [reason, memo].filter(Boolean).join(' / ')
  };

  setStatus('● 전송중', '#f0b429');
  const ok = await sendToSheet(record);
  setStatus('● 대기중', '');

  records.unshift(record);
  records = records.slice(0, 50);
  localStorage.setItem('recordsToday', JSON.stringify(records));
  renderLogs();

  if (ok) showToast('스프레드시트 등록 완료');
  else showToast('로컬 저장 완료: Apps Script URL/배포 권한 확인 필요', true);

  $('locationInput').value = '';
  $('memoInput').value = '';
  $('reasonInput').value = '재고 없음';
  $('locationInfo').classList.remove('on');
  validateForm();
  $('locationInput').focus();
}

async function sendToSheet(record) {
  const scriptUrl = localStorage.getItem('appsScriptUrl') || DEFAULT_APPS_SCRIPT_URL;
  if (!scriptUrl) return false;

  try {
    // CORS 회피를 위해 GET + data 파라미터 방식 사용
    const url = scriptUrl + '?data=' + encodeURIComponent(JSON.stringify(record));
    await fetch(url, { method: 'GET', mode: 'no-cors' });
    return true;
  } catch (e) {
    console.error(e);
    return false;
  }
}

function renderLogs() {
  $('logCount').textContent = `${records.length}건`;
  if (!records.length) {
    $('logList').innerHTML = '<div class="empty">아직 등록된 재고부족 없음</div>';
    return;
  }
  $('logList').innerHTML = records.map(r => `
    <div class="log">
      <div class="log-top"><span class="loc">${escapeHtml(r.location)}</span><span class="time">${escapeHtml(r.timeStr)}</span></div>
      <div>${escapeHtml(r.product || '상품 정보 없음')}</div>
      <div class="tags">
        <span class="tag">${escapeHtml(r.sku || '-')}</span>
        <span class="tag">${escapeHtml(r.worker)}</span>
        <span class="tag">${escapeHtml(r.zone || '-')}</span>
        <span class="tag ok">등록완료</span>
      </div>
      ${r.memo ? `<div class="mini" style="margin-top:8px;margin-bottom:0">${escapeHtml(r.memo)}</div>` : ''}
    </div>
  `).join('');
}

function normalizeLocation(value) { return String(value || '').trim().toUpperCase(); }
function setStatus(text, color) { $('statusBadge').textContent = text; $('statusBadge').style.color = color || ''; }
function showToast(msg, isError=false) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' err' : '');
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2500);
}
function escapeHtml(value) {
  return String(value || '').replace(/[&<>'"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]));
}

init();
</script>
</body>
</html>
