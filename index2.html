<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>피킹존 재고부족 알림</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #f0b429;
    --accent2: #e25822;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 2rem;
  }

  /* Header */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .app-header .logo svg { width: 18px; height: 18px; }
  .app-header .title-area { flex: 1; }
  .app-header h1 { font-size: 15px; font-weight: 700; color: var(--text); }
  .app-header .subtitle { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
  .badge-online {
    font-size: 10px; font-family: var(--mono);
    background: rgba(63,185,80,0.15);
    color: var(--green);
    border: 1px solid rgba(63,185,80,0.3);
    padding: 3px 8px;
    border-radius: 99px;
    white-space: nowrap;
  }

  /* Worker info */
  .worker-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .worker-avatar {
    width: 28px; height: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--text-muted);
  }
  .worker-name { font-size: 13px; font-weight: 500; }
  .worker-zone {
    font-size: 11px; color: var(--accent);
    font-family: var(--mono);
    margin-left: auto;
    background: rgba(240,180,41,0.1);
    border: 1px solid rgba(240,180,41,0.25);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Main sections */
  .section { padding: 16px 16px 0; }

  /* Scan area */
  .scan-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .scan-card-header {
    background: var(--surface2);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .scan-card-header span { font-size: 13px; font-weight: 500; color: var(--text-muted); }
  .step-badge {
    font-size: 11px; font-family: var(--mono);
    background: var(--accent);
    color: #000;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
  }

  .scan-area { padding: 16px; }

  /* Scan input */
  .scan-input-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .scan-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 14px 48px 14px 14px;
    font-family: var(--mono);
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }
  .scan-input::placeholder { color: var(--text-muted); font-size: 13px; letter-spacing: 0; }
  .scan-input:focus { border-color: var(--accent); }
  .scan-input.scanned { border-color: var(--green); background: rgba(63,185,80,0.05); }
  .scan-icon {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }

  /* Product info display */
  .product-info {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 12px;
    display: none;
  }
  .product-info.visible { display: block; }
  .product-info .pi-label { font-size: 11px; color: var(--text-muted); font-family: var(--mono); margin-bottom: 2px; }
  .product-info .pi-value { font-size: 14px; font-weight: 500; color: var(--text); }
  .product-info .pi-row { display: flex; gap: 16px; margin-top: 8px; }
  .product-info .pi-col { flex: 1; }

  /* Memo */
  .memo-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    outline: none;
    resize: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }
  .memo-input::placeholder { color: var(--text-muted); font-size: 13px; }
  .memo-input:focus { border-color: var(--blue); }

  /* Submit button */
  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 15px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }
  .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
  .submit-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; border: 1px solid var(--border); }
  .submit-btn svg { width: 18px; height: 18px; }

  /* Config section */
  .config-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .config-toggle {
    width: 100%;
    background: none;
    border: none;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--sans);
    text-align: left;
  }
  .config-toggle:hover { background: var(--surface2); }
  .config-toggle .arrow { margin-left: auto; transition: transform 0.2s; font-size: 10px; }
  .config-toggle.open .arrow { transform: rotate(180deg); }
  .config-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .config-body.open { display: block; padding-top: 14px; }

  .config-row { margin-bottom: 12px; }
  .config-label { font-size: 11px; color: var(--text-muted); font-family: var(--mono); margin-bottom: 6px; display: block; }
  .config-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    outline: none;
  }
  .config-input:focus { border-color: var(--blue); }

  .config-save-btn {
    background: var(--blue);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }

  /* Log section */
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .log-title { font-size: 13px; font-weight: 500; color: var(--text-muted); }
  .log-count {
    font-size: 11px; font-family: var(--mono);
    background: rgba(88,166,255,0.1);
    color: var(--blue);
    border: 1px solid rgba(88,166,255,0.25);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .log-list { display: flex; flex-direction: column; gap: 8px; }

  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    animation: slideIn 0.25s ease;
  }
  .log-item.new { border-color: var(--green); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .log-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .log-location { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--accent); }
  .log-time { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
  .log-product { font-size: 13px; color: var(--text); margin-bottom: 2px; }
  .log-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .log-tag {
    font-size: 11px; font-family: var(--mono);
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .log-tag.ok { background: rgba(63,185,80,0.1); color: var(--green); border-color: rgba(63,185,80,0.25); }
  .log-tag.warn { background: rgba(248,81,73,0.1); color: var(--red); border-color: rgba(248,81,73,0.25); }

  .empty-log {
    text-align: center;
    padding: 32px 0;
    color: var(--text-muted);
    font-size: 13px;
  }
  .empty-log svg { width: 40px; height: 40px; margin-bottom: 8px; opacity: 0.3; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 99px;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); color: #fff; }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 0 0 16px; }
</style>
</head>
<body>

<div class="app-header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5">
      <rect x="3" y="4" width="18" height="14" rx="2"/>
      <line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="9" y1="4" x2="9" y2="18"/>
    </svg>
  </div>
  <div class="title-area">
    <h1>재고부족 스캔</h1>
    <div class="subtitle">피킹존 · 재고부족 알림 시스템</div>
  </div>
  <div class="badge-online" id="status-badge">● 대기중</div>
</div>

<div class="worker-bar">
  <div class="worker-avatar">👷</div>
  <div class="worker-name" id="worker-display">작업자명 미설정</div>
  <div class="worker-zone" id="zone-display">ZONE-?</div>
</div>

<div class="section">
  <!-- Scan Card -->
  <div class="scan-card">
    <div class="scan-card-header">
      <span class="step-badge">STEP 1</span>
      <span>로케이션 바코드 스캔</span>
    </div>
    <div class="scan-area">
      <div class="scan-input-wrap">
        <input type="text" class="scan-input" id="location-input"
          placeholder="바코드 스캔 또는 직접 입력 (예: A-01-03)"
          autocomplete="off" autocorrect="off" spellcheck="false"
          inputmode="none"
        />
        <span class="scan-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/>
            <rect x="3" y="16" width="5" height="5"/>
            <line x1="10" y1="4" x2="10" y2="8"/><line x1="14" y1="4" x2="14" y2="8"/>
            <line x1="10" y1="16" x2="10" y2="20"/><line x1="14" y1="16" x2="14" y2="20"/>
            <line x1="16" y1="10" x2="20" y2="10"/><line x1="16" y1="14" x2="20" y2="14"/>
            <line x1="4" y1="10" x2="8" y2="10"/><line x1="4" y1="14" x2="8" y2="14"/>
          </svg>
        </span>
      </div>

      <div class="product-info" id="product-info">
        <div class="pi-label">로케이션 정보</div>
        <div class="pi-value" id="pi-location">—</div>
        <div class="pi-row">
          <div class="pi-col">
            <div class="pi-label">상품명</div>
            <div class="pi-value" id="pi-product">—</div>
          </div>
          <div class="pi-col">
            <div class="pi-label">SKU</div>
            <div class="pi-value" id="pi-sku">—</div>
          </div>
        </div>
      </div>

      <div class="scan-card-header" style="margin: 0 -16px 12px; border-top: 1px solid var(--border); background: none; padding: 10px 16px;">
        <span class="step-badge" style="background: var(--blue);">STEP 2</span>
        <span>메모 (선택사항)</span>
      </div>
      <textarea class="memo-input" id="memo-input" rows="2"
        placeholder="추가 메모 (예: 빈 박스 있음, 오피킹 확인 필요 등)"></textarea>

      <button class="submit-btn" id="submit-btn" disabled onclick="submitRecord()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        재고부족 등록
      </button>
    </div>
  </div>

  <!-- Config -->
  <div class="config-card">
    <button class="config-toggle" id="config-toggle" onclick="toggleConfig()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41"/>
      </svg>
      설정 (작업자 정보 / Google Sheets 연동)
      <span class="arrow">▼</span>
    </button>
    <div class="config-body" id="config-body">
      <div class="config-row">
        <label class="config-label">작업자명</label>
        <input type="text" class="config-input" id="cfg-worker" placeholder="예: 홍길동" />
      </div>
      <div class="config-row">
        <label class="config-label">담당 구역 (Zone)</label>
        <input type="text" class="config-input" id="cfg-zone" placeholder="예: ZONE-A" />
      </div>
      <div class="config-row">
        <label class="config-label">Google Sheets 웹훅 URL (고정)</label>
        <input type="text" class="config-input" id="cfg-sheet-url" value="※ 관리자 고정값" disabled style="opacity:0.4;cursor:not-allowed;" />
      </div>
      <div class="config-row">
        <label class="config-label">Slack 웹훅 URL (선택)</label>
        <input type="text" class="config-input" id="cfg-slack-url" placeholder="https://hooks.slack.com/services/..." />
      </div>
      <button class="config-save-btn" onclick="saveConfig()">저장</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Log -->
  <div class="log-header">
    <span class="log-title">오늘 등록 내역</span>
    <span class="log-count" id="log-count">0건</span>
  </div>
  <div class="log-list" id="log-list">
    <div class="empty-log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <p>아직 등록된 재고부족 없음</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 고정 설정 (관리자) =====
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9ilgVE8yCOabC13B5i8UIZ671TqCFBrw8z0YmWQq9AKnrx8yHmpLlYCub3L1fJy1gWw/exec'; // Apps Script 배포 후 여기에 URL 붙여넣기
const SPREADSHEET_ID  = '1drwXWUf0tafs4wHXiMGgdaEb1jPGjtqzAbusXliB0eE';
// ==============================

// === Mock product data (실제 연동 시 FMS DB API로 교체) ===
const mockProducts = {
  'A-01-01': { product: '무선 마우스 M720', sku: 'SKU-00123' },
  'A-01-02': { product: '기계식 키보드 K3', sku: 'SKU-00124' },
  'A-01-03': { product: '모니터 27인치 4K', sku: 'SKU-00125' },
  'B-02-01': { product: '에어팟 프로 2세대', sku: 'SKU-00201' },
  'B-02-02': { product: 'USB-C 허브 7포트', sku: 'SKU-00202' },
  'C-03-01': { product: '노트북 파우치 15"', sku: 'SKU-00301' },
};

let config = {};
let records = [];

function loadConfig() {
  try {
    config = JSON.parse(localStorage.getItem('wh_config') || '{}');
    records = JSON.parse(localStorage.getItem('wh_records_today') || '[]');
    const today = new Date().toDateString();
    if (localStorage.getItem('wh_date') !== today) {
      records = [];
      localStorage.setItem('wh_date', today);
      localStorage.setItem('wh_records_today', '[]');
    }
  } catch(e) { config = {}; records = []; }
  applyConfig();
  renderLog();
}

function applyConfig() {
  if (config.worker) {
    document.getElementById('worker-display').textContent = config.worker;
    document.getElementById('cfg-worker').value = config.worker;
  }
  if (config.zone) {
    document.getElementById('zone-display').textContent = config.zone;
    document.getElementById('cfg-zone').value = config.zone;
  }
  if (config.slackUrl) document.getElementById('cfg-slack-url').value = config.slackUrl;
}

function saveConfig() {
  config.worker = document.getElementById('cfg-worker').value.trim();
  config.zone = document.getElementById('cfg-zone').value.trim();
  config.slackUrl = document.getElementById('cfg-slack-url').value.trim();
  localStorage.setItem('wh_config', JSON.stringify(config));
  applyConfig();
  showToast('설정 저장 완료');
}

function toggleConfig() {
  const btn = document.getElementById('config-toggle');
  const body = document.getElementById('config-body');
  btn.classList.toggle('open');
  body.classList.toggle('open');
}

// Location scan
const locInput = document.getElementById('location-input');
locInput.addEventListener('input', () => {
  const val = locInput.value.trim().toUpperCase();
  const submitBtn = document.getElementById('submit-btn');
  if (val.length >= 3) {
    locInput.classList.add('scanned');
    submitBtn.disabled = false;
    lookupProduct(val);
  } else {
    locInput.classList.remove('scanned');
    submitBtn.disabled = true;
    document.getElementById('product-info').classList.remove('visible');
  }
});

// Support barcode scanners (Enter key)
locInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (!document.getElementById('submit-btn').disabled) submitRecord();
  }
});

function lookupProduct(loc) {
  const info = mockProducts[loc];
  const pi = document.getElementById('product-info');
  if (info) {
    document.getElementById('pi-location').textContent = loc;
    document.getElementById('pi-product').textContent = info.product;
    document.getElementById('pi-sku').textContent = info.sku;
    pi.classList.add('visible');
  } else {
    document.getElementById('pi-location').textContent = loc;
    document.getElementById('pi-product').textContent = '상품 정보 없음 (직접 확인 필요)';
    document.getElementById('pi-sku').textContent = '—';
    pi.classList.add('visible');
  }
}

async function submitRecord() {
  const location = locInput.value.trim().toUpperCase();
  const memo = document.getElementById('memo-input').value.trim();
  const now = new Date();
  const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  const dtStr = now.toISOString();

  const info = mockProducts[location] || { product: '—', sku: '—' };
  const record = {
    timestamp: dtStr,
    timeStr,
    location,
    product: info.product,
    sku: info.sku,
    worker: config.worker || '미설정',
    zone: config.zone || '—',
    memo,
  };

  document.getElementById('status-badge').textContent = '● 전송중';
  document.getElementById('status-badge').style.color = '#f0b429';

  const results = await Promise.allSettled([
    sendToSheets(record),
    sendToSlack(record),
  ]);

  records.unshift(record);
  localStorage.setItem('wh_records_today', JSON.stringify(records.slice(0, 50)));
  renderLog(true);

  const sheetOk = results[0].status === 'fulfilled' && results[0].value;
  document.getElementById('status-badge').textContent = '● 대기중';
  document.getElementById('status-badge').style.color = '';

  if (sheetOk) {
    showToast('✓ 스프레드시트 등록 완료!');
  } else if (APPS_SCRIPT_URL) {
    showToast('로컬 저장 완료 (시트 연결 확인 필요)', true);
  } else {
    showToast('✓ 등록 완료 (로컬 저장)');
  }

  // Reset
  locInput.value = '';
  locInput.classList.remove('scanned');
  document.getElementById('memo-input').value = '';
  document.getElementById('product-info').classList.remove('visible');
  document.getElementById('submit-btn').disabled = true;
  locInput.focus();
}

async function sendToSheets(record) {
  if (!APPS_SCRIPT_URL) return false;
  try {
    const url = APPS_SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify({ ...record, spreadsheetId: SPREADSHEET_ID }));
    const res = await fetch(url, { method: 'GET' });
    const json = await res.json();
    return json.status === 'ok';
  } catch(e) { return false; }
}

async function sendToSlack(record) {
  if (!config.slackUrl) return false;
  const msg = {
    text: `🚨 *피킹존 재고부족 발생*\n*로케이션*: \`${record.location}\`\n*상품*: ${record.product} (${record.sku})\n*작업자*: ${record.worker} | *구역*: ${record.zone}\n*시각*: ${record.timeStr}${record.memo ? `\n*메모*: ${record.memo}` : ''}`,
  };
  try {
    await fetch(config.slackUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(msg),
    });
    return true;
  } catch(e) { return false; }
}

function renderLog(isNew = false) {
  const list = document.getElementById('log-list');
  document.getElementById('log-count').textContent = `${records.length}건`;
  if (records.length === 0) {
    list.innerHTML = `<div class="empty-log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <p>아직 등록된 재고부족 없음</p>
    </div>`;
    return;
  }
  list.innerHTML = records.map((r, i) => `
    <div class="log-item ${i === 0 && isNew ? 'new' : ''}">
      <div class="log-top">
        <span class="log-location">${r.location}</span>
        <span class="log-time">${r.timeStr}</span>
      </div>
      <div class="log-product">${r.product}</div>
      <div class="log-meta">
        <span class="log-tag">${r.sku}</span>
        <span class="log-tag">${r.worker}</span>
        <span class="log-tag ok">등록완료</span>
        ${r.memo ? `<span class="log-tag warn">메모있음</span>` : ''}
      </div>
      ${r.memo ? `<div style="font-size:12px;color:var(--text-muted);margin-top:6px;font-style:italic;">${r.memo}</div>` : ''}
    </div>
  `).join('');
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

loadConfig();
locInput.focus();
</script>
</body>
</html>
